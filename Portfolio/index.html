<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prateek - Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Ubuntu+Mono&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.12/typed.min.js"></script>
  <style>
    /* Custom CSS for responsiveness and requirements */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #0a0a23;
      color: #ffffff;
      transition: background-color 0.3s, color 0.3s;
      padding-top: 3rem;
    }
    body.light-mode {
      background-color: #f0f0f5;
      color: #0a0a23;
    }
    a { text-decoration: none; color: #ffffff; }
    .container { max-width: 80rem; margin: 0 auto; padding: 0 1.5rem; }
    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: transparent;
      z-index: 60;
      padding: 0.5rem 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: transform 0.3s ease;
    }
    header.hidden {
      transform: translateY(-100%);
    }
    .window-dots {
      display: flex;
      gap: 0.3rem;
    }
    .dot {
      width: 0.75rem;
      height: 0.75rem;
      border-radius: 50%;
    }
    .dot.red { background-color: #ff5f56; }
    .dot.yellow { background-color: #ffbd2e; }
    .dot.green { background-color: #27c93f; }
    .window-title {
      font-family: 'Ubuntu Mono', monospace;
      font-size: 0.75rem;
      color: #a0a0b0;
    }
    body.light-mode .window-title { color: #4a4a6e; }
    .nav-links {
      display: flex;
      gap: 1rem;
      font-size: 0.875rem;
      font-weight: 400;
      margin-left: 1rem;
    }
    .nav-links a {
      color: #ffffff;
      position: relative;
      transition: color 0.3s;
    }
    body.light-mode .nav-links a { color: #0a0a23; }
    .nav-links a.active::after {
      content: '';
      position: absolute;
      bottom: -0.25rem;
      left: 0;
      width: 100%;
      height: 2px;
      background-color: #3b82f6;
    }
    .nav-links a:hover { color: #3b82f6; }
    .theme-toggle, .song-toggle {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      margin-left: 1rem;
      color: #ffffff;
    }
    body.light-mode .theme-toggle, body.light-mode .song-toggle { color: #0a0a23; }
    .theme-icon::before { content: '☀️'; }
    body.light-mode .theme-icon::before { content: '🌙'; }
    .song-icon::before { content: '▶️'; }
    .song-icon.playing::before { content: '⏸️'; }
    /* Hero Section */
    #home {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1.5rem;
    }
    .hero-container {
      display: flex;
      align-items: center;
      gap: 3rem;
      width: 100%;
      max-width: 80rem;
      margin-left: 4rem;
    }
    .left-side {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1rem;
      flex: 1;
    }
    .profile-img {
      width: 20rem;
      height: 20rem;
      border-radius: 50%;
      background-color: #4a4a6e;
    }
    .status {
      display: inline-flex;
      align-items: center;
      background-color: #6b48ff;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 400;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      gap: 0.5rem;
    }
    .status-dot {
      width: 0.75rem;
      height: 0.75rem;
      background-color: #a0a0b0;
      border-radius: 50%;
    }
    .right-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .name {
      font-size: 4.5rem;
      font-weight: 700;
      background: linear-gradient(to right, #3b82f6, #9333ea);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .subtitle {
      font-size: 1.5rem;
      font-weight: 300;
      color: #ffffff;
    }
    body.light-mode .subtitle { color: #0a0a23; }
    .subtitle-highlight { color: #3b82f6; }
    .tagline {
      font-family: 'Ubuntu Mono', monospace;
      font-size: 1.125rem;
      font-weight: 300;
      color: #a0a0b0;
      position: relative;
    }
    body.light-mode .tagline { color: #4a4a6e; }
    .tagline .command { color: #3b82f6; }
    .blinking-pipe {
      font-weight: 700;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    /* Footer */
    footer {
      padding: 2rem 0;
      text-align: center;
      background-color: #0a0a23;
    }
    body.light-mode footer { background-color: #f0f0f5; }
    .footer-text {
      font-size: 0.875rem;
      font-weight: 300;
      margin-bottom: 1rem;
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      font-size: 1rem;
      font-weight: 400;
    }
    .footer-links a {
      color: #ffffff;
      transition: color 0.3s;
    }
    body.light-mode .footer-links a { color: #0a0a23; }
    .footer-links a:hover { color: #3b82f6; }
    /* Responsive Design */
    @media (max-width: 768px) {
      .hero-container {
        flex-direction: column;
        align-items: center;
        margin-left: 0;
      }
      .left-side, .right-side {
        align-items: center;
        text-align: center;
      }
      .profile-img {
        width: 16rem;
        height: 16rem;
      }
      .name {
        font-size: 3rem;
      }
      .subtitle {
        font-size: 1.25rem;
      }
      .tagline {
        font-size: 1rem;
      }
      .nav-links {
        gap: 0.5rem;
        font-size: 0.75rem;
      }
      .theme-toggle, .song-toggle {
        font-size: 0.875rem;
        margin-left: 0.5rem;
      }
    }
    @media (max-width: 640px) {
      header {
        padding: 0.25rem 0.5rem;
      }
      .window-title {
        font-size: 0.625rem;
      }
      .dot {
        width: 0.5rem;
        height: 0.5rem;
      }
      .nav-links {
        gap: 0.25rem;
        font-size: 0.625rem;
      }
      .theme-toggle, .song-toggle {
        font-size: 0.75rem;
      }
      .profile-img {
        width: 16rem;
        height: 16rem;
      }
      .name {
        font-size: 2.5rem;
      }
      .subtitle {
        font-size: 1rem;
      }
      .tagline {
        font-size: 0.875rem;
      }
      .status {
        font-size: 0.875rem;
        padding: 0.4rem 0.8rem;
      }
      .section-title {
        font-size: 2rem;
      }
      .about-text {
        font-size: 1rem;
      }
      .skill-card h3 {
        font-size: 1.125rem;
      }
      .skill-card p {
        font-size: 0.75rem;
      }
      .social-links {
        flex-direction: column;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header id="header">
    <div class="window-dots">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
    </div>
    <span class="window-title">[prateek@ai-eng]-[~/home]</span>
    <div class="nav-links">
      <a href="#home" class="active" data-section="home">home</a>
      <a href="about.html" data-section="about">about</a>
      <a href="contact.html" data-section="contact">contact</a>
    </div>
    <button class="theme-toggle">
      <span class="theme-icon"></span>
    </button>
    <button class="song-toggle">
      <span class="song-icon"></span>
    </button>
    <audio id="background-song" loop>
      <source src="Happy Piano Music  Beautiful Background Music [Copyright Free Music].mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>
  </header>

  <!-- Home Section -->
  <section id="home">
    <div class="hero-container">
      <div class="left-side">
        <div class="profile-img"><img src="gihbili1.jpg" alt="Prateek Kumar" class="profile-img"></div>
        <div class="status">
          <span class="status-dot"></span>
          <span id="status-text"></span>
        </div>
      </div>
      <div class="right-side">
        <h1 class="name"><span id="typed-name"></span></h1>
        <p class="subtitle">
          AI Student • <span class="subtitle-highlight">Robotics, LLMs, Agents</span>
        </p>
        <p class="tagline">
          prateek@ai-eng:~$ <span class="command">echo "Building real-world systems - one coffee at a time"</span><span class="blinking-pipe">|</span>
        </p>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p class="footer-text">© 2025 Prateek Kumar. All rights reserved.</p>
    <div class="footer-links">
      <a href="#home">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="https://github.com/prateekcandwill">GitHub</a>
    </div>
  </footer>

  <script>
    // Initialize Typed.js for the name (types once and stops)
    const typedName = new Typed('#typed-name', {
      strings: ['Prateek'],
      typeSpeed: 60,
      loop: false,
    });

    // Update window title based on active section
    const navLinks = document.querySelectorAll('.nav-links a');
    const windowTitle = document.querySelector('.window-title');
    navLinks.forEach(link => {
      link.addEventListener('click', (e) => {
        navLinks.forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        const section = link.getAttribute('data-section');
        windowTitle.textContent = `[Prateek@ai-eng]-[~/${section}]`;
      });
    });

    // Check time for status text (2 PM to 4 AM IST)
    const now = new Date();
    const istOffset = 5.5 * 60 * 60 * 1000; // IST is UTC+5:30
    const istTime = new Date(now.getTime() + istOffset);
    const hours = istTime.getUTCHours();
    const statusText = document.getElementById('status-text');
    if (hours >= 14 || hours < 4) {
      statusText.textContent = '💻 Now coding...';
    } else {
      statusText.textContent = 'Just Chilling';
    }

    // Theme Toggle
    const themeToggle = document.querySelector('.theme-toggle');
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('light-mode');
      localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    });

    // Load saved theme
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
      document.body.classList.add('light-mode');
    }

    // Song Play/Pause Toggle
    const songToggle = document.querySelector('.song-toggle');
    const songIcon = document.querySelector('.song-icon');
    const audio = document.getElementById('background-song');
    songToggle.addEventListener('click', () => {
      if (audio.paused) {
        audio.play();
        songIcon.classList.add('playing');
      } else {
        audio.pause();
        songIcon.classList.remove('playing');
      }
    });

    // Header Scroll Behavior
    let lastScrollTop = 0;
    const header = document.getElementById('header');
    window.addEventListener('scroll', () => {
      let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
      if (scrollTop > lastScrollTop) {
        header.classList.add('hidden');
      } else {
        header.classList.remove('hidden');
      }
      lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
    });
  </script>
</body>
</html>
